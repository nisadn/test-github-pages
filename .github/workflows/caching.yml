name: Caching
on:
  push:
    branches:
      - feat/cache-3

jobs:
  caching:
    name: Caching Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          # File containing the version Spec of the version to use.  Examples: package.json, .nvmrc, .node-version, .tool-versions.
          node-version-file: .nvmrc
          cache: "yarn"
      - name: Cache Next.js build & node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/yarn.lock') }}-
            ${{ runner.os }}-nextjs-${{ hashFiles('.nvmrc') }}-
            ${{ runner.os }}-nextjs-
      - name: Run install
        run: |
          yarn install --frozen-lockfile # will run `yarn install` command
      - name: Run build
        run: |
          yarn build
