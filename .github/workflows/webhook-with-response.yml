name: Webhook Response Handler

on:
  repository_dispatch:
    types: [jira-update]
  workflow_dispatch:
    inputs:
      jira_key:
        description: 'Jira ticket to process'
        required: true
        type: string

jobs:
  process-jira-webhook:
    runs-on: ubuntu-latest
    outputs:
      pr_found: ${{ steps.process.outputs.pr_found }}
      pr_number: ${{ steps.process.outputs.pr_number }}
      comment_added: ${{ steps.process.outputs.comment_added }}
      
    steps:
      - name: Process Jira Update
        id: process
        run: |
          # Extract Jira data
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            JIRA_KEY="${{ github.event.inputs.jira_key }}"
            JIRA_SUMMARY="Manual test"
            JIRA_STATUS="In Progress"
            JIRA_URL="https://your-domain.atlassian.net/browse/$JIRA_KEY"
          else
            JIRA_KEY="${{ github.event.client_payload.issue.key }}"
            JIRA_SUMMARY="${{ github.event.client_payload.issue.summary }}"
            JIRA_STATUS="${{ github.event.client_payload.issue.status }}"
            JIRA_URL="${{ github.event.client_payload.issue.url }}"
          fi
          
          echo "Processing Jira update for: $JIRA_KEY"
          
          # Search for PRs with this Jira key
          PRS=$(curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open" | \
            jq -r ".[] | select(.title | test(\"$JIRA_KEY\"; \"i\") or .body | test(\"$JIRA_KEY\"; \"i\") or .head.ref | test(\"$JIRA_KEY\"; \"i\")) | .number")
          
          if [ -z "$PRS" ]; then
            echo "pr_found=false" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "comment_added=false" >> $GITHUB_OUTPUT
            echo "❌ No PRs found for $JIRA_KEY"
            exit 0
          fi
          
          # Process first found PR
          PR_NUMBER=$(echo "$PRS" | head -1)
          echo "pr_found=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          echo "✅ Found PR #$PR_NUMBER for $JIRA_KEY"
          
          # Add comment
          COMMENT="🎫 **Jira Update**: [$JIRA_KEY]($JIRA_URL)
          
**Status**: \`$JIRA_STATUS\`
**Summary**: $JIRA_SUMMARY

_Updated automatically from Jira at $(date)_"

          RESPONSE=$(curl -L -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            -d "$(echo "$COMMENT" | jq -R -s '{"body": .}')")
          
          HTTP_CODE="${RESPONSE: -3}"
          
          if [ "$HTTP_CODE" = "201" ]; then
            echo "comment_added=true" >> $GITHUB_OUTPUT
            echo "✅ Comment added to PR #$PR_NUMBER"
          else
            echo "comment_added=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to add comment (HTTP $HTTP_CODE)"
          fi

  # This job creates a summary that could be returned to Jira
  create-response:
    needs: process-jira-webhook
    runs-on: ubuntu-latest
    steps:
      - name: Create Response Summary
        run: |
          echo "=== WEBHOOK PROCESSING SUMMARY ==="
          echo "PR Found: ${{ needs.process-jira-webhook.outputs.pr_found }}"
          echo "PR Number: ${{ needs.process-jira-webhook.outputs.pr_number }}"
          echo "Comment Added: ${{ needs.process-jira-webhook.outputs.comment_added }}"
          echo "Workflow Run: ${{ github.run_id }}"
          echo "Repository: ${{ github.repository }}"
          
          # This could be sent back to Jira via another API call
          if [ "${{ needs.process-jira-webhook.outputs.comment_added }}" = "true" ]; then
            echo "✅ SUCCESS: GitHub integration completed"
          else
            echo "⚠️  WARNING: Integration had issues"
          fi