name: Auto Commit and PR
on: push
branches:
  - master
jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Make some changes (e.g., update a file)
        run: echo "New content" >> generated_file.txt
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "[Automated] Add generated file"
          title: "[Automated PR] New file generated by workflow"
          body: |
            This PR is auto-generated by the [Auto Commit and PR](https://github.com/peter-evans/create-pull-request) action.
          branch: automated-changes-branch
          base: master # Target branch to merge into