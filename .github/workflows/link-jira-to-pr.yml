name: Link Jira to PR

on:
  pull_request:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket ID (e.g., TEST-123)'
        required: true
        type: string
      pr_number:
        description: 'PR number (optional, uses current PR if not specified)'
        required: false
        type: string

jobs:
  link-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira ticket from branch or input
        id: extract-jira
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "jira_id=${{ github.event.inputs.jira_ticket }}" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.inputs.pr_number || github.event.number }}" >> $GITHUB_OUTPUT
          else
            # Extract from branch name (e.g., feat/TEST-123-description)
            BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
            JIRA_ID=$(echo "$BRANCH_NAME" | grep -oE '[A-Z]+-[0-9]+' || echo "")
            echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Update PR description with Jira link
        if: steps.extract-jira.outputs.jira_id != ''
        run: |
          JIRA_ID="${{ steps.extract-jira.outputs.jira_id }}"
          PR_NUMBER="${{ steps.extract-jira.outputs.pr_number }}"
          JIRA_URL="https://your-domain.atlassian.net/browse/$JIRA_ID"
          
          # Get current PR body
          CURRENT_BODY=$(curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | jq -r '.body // ""')
          
          # Check if Jira link already exists
          if echo "$CURRENT_BODY" | grep -q "$JIRA_ID"; then
            echo "Jira ticket already linked in PR description"
            exit 0
          fi
          
          # Add Jira section to PR body
          NEW_BODY="$CURRENT_BODY

## Related Jira Issue
🔗 [$JIRA_ID]($JIRA_URL)"
          
          # Update PR description
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" \
            -d "{\"body\":$(echo "$NEW_BODY" | jq -R -s .)}"

      - name: Add Jira comment to PR
        if: steps.extract-jira.outputs.jira_id != ''
        run: |
          JIRA_ID="${{ steps.extract-jira.outputs.jira_id }}"
          PR_NUMBER="${{ steps.extract-jira.outputs.pr_number }}"
          JIRA_URL="https://your-domain.atlassian.net/browse/$JIRA_ID"
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            -d "{\"body\":\"🔗 **Related Jira Ticket**: [$JIRA_ID]($JIRA_URL)\"}"