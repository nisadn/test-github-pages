name: "[Testing] Request to Publish"

on:
  push:
    branches:
      - testing/push

jobs:
  create-pull-request:
    name: Create Pull Request to publish
    needs: make-changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Changes
        uses: ./.github/actions/update-version
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Automated PR"
          commit-message: "Update"
          branch: "publish-rc"
          base: ${{ github.ref_name }}
