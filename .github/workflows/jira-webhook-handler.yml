name: Handle Jira Webhook

on:
  repository_dispatch:
    types: [jira-update]

jobs:
  add-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add Jira update comment to PR
        run: |
          # Extract data from webhook payload
          JIRA_KEY="${{ github.event.client_payload.issue.key }}"
          JIRA_SUMMARY="${{ github.event.client_payload.issue.summary }}"
          JIRA_STATUS="${{ github.event.client_payload.issue.status }}"
          JIRA_URL="${{ github.event.client_payload.issue.url }}"
          
          echo "Processing Jira update for: $JIRA_KEY"
          
          # Method 1: Find PR with Jira key in title, body, or branch name
          PRS=$(curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open" | \
            jq -r ".[] | select(.title | test(\"$JIRA_KEY\"; \"i\") or .body | test(\"$JIRA_KEY\"; \"i\") or .head.ref | test(\"$JIRA_KEY\"; \"i\")) | .number")
          
          # Method 2: If no PRs found by content, search by branch pattern
          if [ -z "$PRS" ]; then
            echo "No PRs found by content, searching by branch pattern..."
            PRS=$(curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pulls?state=open" | \
              jq -r ".[] | select(.head.ref | test(\"[A-Z]+-[0-9]+\") and (.head.ref | test(\"$JIRA_KEY\"))) | .number")
          fi
          
          if [ -z "$PRS" ]; then
            echo "No matching PRs found for Jira issue: $JIRA_KEY"
            exit 0
          fi
          
          # Add comment to each matching PR
          for PR_NUMBER in $PRS; do
            if [ ! -z "$PR_NUMBER" ]; then
              echo "Adding comment to PR #$PR_NUMBER"
              
              COMMENT="🎫 **Jira Update**: [$JIRA_KEY]($JIRA_URL)
              
**Status**: \`$JIRA_STATUS\`
**Summary**: $JIRA_SUMMARY

_Updated automatically from Jira_"

              curl -L \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
                -d "{\"body\":$(echo "$COMMENT" | jq -R -s .)}"
              
              echo "Comment added successfully to PR #$PR_NUMBER"
            fi
          done